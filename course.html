<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Khóa học</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

img{
width:100%;
border-radius:10px;
}

.price{
color:red;
font-size:26px;
}

.old{
text-decoration:line-through;
color:gray;
}

.timer{
font-size:20px;
color:#ff5722;
margin:10px 0;
}

button{
background:#ff5722;
color:white;
border:none;
padding:15px 20px;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

.qr{
margin-top:20px;
display:none;
text-align:center;
}

.qr img{
width:300px;
}

</style>

</head>

<body>

<div class="container" id="course"></div>

<script>

const API="https://script.google.com/macros/s/AKfycby7ENqYYIycksLe8HaSnYFfjOXDD_KBHKa_PA3RRjxTdXEod4DKafN0TDny_pgSJf6i/exec";

const BANK="MBBank"
const ACCOUNT="8877848800613"
const NAME="LUU THI HOA"

const params=new URLSearchParams(window.location.search)
const id=params.get("id")

fetch(API)
.then(r=>r.json())
.then(data=>{

const course=data.find(c=>c.ID==id)

let box=document.getElementById("course")

box.innerHTML=`

<img src="${course["Ảnh"]}">

<h1>${course["Tên"]}</h1>

<p>${course["Mô tả"]}</p>

<div class="price">${course["Giá sale"]} đ</div>
<div class="old">${course["Giá gốc"]} đ</div>

<div class="timer" id="timer"></div>

<button onclick="showQR('${course["Giá sale"]}')">
Thanh toán
</button>

<div class="qr" id="qr"></div>
<div style="text-align:center; margin-top: 30px; background: #fff; padding: 20px; border-radius: 10px;">
  <h3>Xác nhận đã chuyển khoản</h3>
  <input id="name" placeholder="Nhập @username Telegram của bạn" style="padding: 10px; width: 80%; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 15px;">
  <br>
  <button onclick="sendBill()" style="background: #4CAF50; color: white;">Tôi đã chuyển khoản thành công</button>
</div>
`

})

function showQR(price){

const text="KHOAHOC"

const qr=`https://img.vietqr.io/image/${BANK}-${ACCOUNT}-compact.png?amount=${price}&addInfo=${text}&accountName=${NAME}`

document.getElementById("qr").style.display="block"

document.getElementById("qr").innerHTML=`

<h3>Quét mã để thanh toán</h3>

<img src="${qr}">

<p>Nội dung CK: ${text}</p>

`

}

function countdown(){

const end=new Date("2026-03-14 23:59:59").getTime()

const now=new Date().getTime()

const diff=end-now

if(diff<0)return

const h=Math.floor(diff/1000/60/60)
const m=Math.floor(diff/1000/60)%60
const s=Math.floor(diff/1000)%60

document.getElementById("timer").innerHTML=
"Flash Sale còn: "+h+"h "+m+"m "+s+"s"

}

setInterval(countdown,1000)
function sendBill(){
  const name=document.getElementById("name").value;
  if(!name) {
    alert("Vui lòng nhập nick Telegram của bạn!");
    return;
  }
  
  // Nút bấm đang gửi, đổi chữ để khách biết
  alert("Đang gửi hóa đơn, vui lòng đợi 2-3 giây...");
  
  fetch("https://script.google.com/macros/s/AKfycby7ENqYYIycksLe8HaSnYFfjOXDD_KBHKa_PA3RRjxTdXEod4DKafN0TDny_pgSJf6i/exec",{
    method:"POST",
    body:JSON.stringify({
      name:name,
      course:id
    })
  }).then(() => {
    alert("✅ Đã gửi bill thành công! Quản trị viên sẽ liên hệ bạn qua Telegram sớm nhất.");
  }).catch(() => {
    alert("❌ Có lỗi xảy ra, vui lòng thử lại!");
  });
}
</script>

</body>
</html>
