<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Thư viện món ăn</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

h1{
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
cursor:pointer;
}

.card img{
width:100%;
border-radius:8px;
}

</style>

</head>

<body>

<h1>Thư viện món ăn</h1>

<div id="foods" class="grid"></div>

<script>

const API="LINK_API?type=mon"

fetch(API)
.then(r=>r.json())
.then(data=>{

let box=document.getElementById("foods")

data.forEach(f=>{

box.innerHTML+=`

<div class="card" onclick="openCourse('${f["Khóa"]}')">

<img src="${f["Ảnh"]}">

<h4>${f["Tên món"]}</h4>

<p>${f["Danh mục"]}</p>

</div>

`

})

})

function openCourse(id){

window.location.href="course.html?id="+id

}

</script>

</body>
</html>
