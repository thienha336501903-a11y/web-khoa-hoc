<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Khóa học nấu ăn</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

h1{
text-align:center;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:8px;
}

.price{
color:red;
font-size:18px;
}

</style>

</head>

<body>

<h1>Danh sách khóa học</h1>

<div id="courses" class="grid"></div>

<script>

const API="DÁN_LINK_API_CỦA_BẠN";

function openCourse(id){

window.location.href="course.html?id="+id

}

fetch(API)
.then(r=>r.json())
.then(data=>{

let box=document.getElementById("courses")

data.forEach(c=>{

if(c["Hiển thị"]!="ON") return

box.innerHTML+=`

<div class="card" onclick="openCourse('${c["ID"]}')">

<img src="${c["Ảnh"]}">

<h3>${c["Tên"]}</h3>

<p>${c["Mô tả"]}</p>

<div class="price">${c["Giá sale"]} đ</div>

</div>

`

})

})

</script>

</body>
</html>
